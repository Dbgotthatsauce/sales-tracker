<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sales Tracker</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>

  <!-- ══════════════════════════════════════════════════════════
       ANSICHT 1: LOGIN
  ═══════════════════════════════════════════════════════════════ -->
  <div id="login-view">
    <div class="login-card">
      <div class="login-logo">
        <span class="login-logo-icon">📈</span>
        <span class="login-logo-title">Sales Tracker</span>
      </div>
      <p class="login-subtitle">Melde dich mit deinem Team-Account an.</p>
      <div id="login-error" class="login-error hidden"></div>
      <div class="login-field">
        <label for="loginEmail" class="login-label">E-Mail</label>
        <input id="loginEmail" type="email" autocomplete="email" placeholder="deine@email.de" class="login-input" />
      </div>
      <div class="login-field">
        <label for="loginPassword" class="login-label">Passwort</label>
        <input id="loginPassword" type="password" autocomplete="current-password" placeholder="••••••••" class="login-input" />
      </div>
      <button id="loginBtn" class="login-btn">
        <span id="loginBtnText">Einloggen</span>
        <span id="loginBtnSpinner" class="hidden login-spinner">⟳</span>
      </button>
    </div>
  </div>

  <!-- ══════════════════════════════════════════════════════════
       ANSICHT 2: TRACKER
  ═══════════════════════════════════════════════════════════════ -->
  <div id="tracker-view" class="hidden">
  <div class="app">

    <!-- Header -->
    <header class="header">
      <div class="user-info">
        <span class="user-avatar">👤</span>
        <span id="userEmail" class="user-email">–</span>
      </div>
      <button id="logoutBtn" class="logout-btn" title="Ausloggen">⏻</button>
    </header>

    <!-- Tab Navigation -->
    <nav class="tabs">
      <button class="tab active" data-tab="cold-calling">Cold Calling</button>
      <button class="tab" data-tab="setting">Setting</button>
      <button class="tab" data-tab="closing">Closing</button>
    </nav>

    <!-- Session Expired Banner -->
    <div id="session-expired-banner" class="session-banner hidden">
      <span>Sitzung abgelaufen.</span>
      <button id="reloginBtn" class="session-banner-btn">Neu einloggen</button>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast hidden"></div>

    <!-- ── COLD CALLING ─────────────────────────────────────────── -->
    <section id="cold-calling" class="panel active">
      <div class="btn-grid">

        <button class="kpi-btn" data-event="Anwahlen">
          <span class="kpi-icon">📞</span>
          <span class="kpi-label">Anwahlen</span>
          <input class="counter-input" type="number" value="0" min="0" />
        </button>

        <button class="kpi-btn" data-event="Erreichte Personen">
          <span class="kpi-icon">🙋</span>
          <span class="kpi-label">Erreichte Personen</span>
          <input class="counter-input" type="number" value="0" min="0" />
        </button>

        <button class="kpi-btn" data-event="Entscheider">
          <span class="kpi-icon">👔</span>
          <span class="kpi-label">Entscheider</span>
          <input class="counter-input" type="number" value="0" min="0" />
        </button>

        <button class="kpi-btn" data-event="Intro">
          <span class="kpi-icon">👋</span>
          <span class="kpi-label">Intro</span>
          <input class="counter-input" type="number" value="0" min="0" />
        </button>

        <button class="kpi-btn" data-event="Short Story">
          <span class="kpi-icon">📖</span>
          <span class="kpi-label">Short Story</span>
          <input class="counter-input" type="number" value="0" min="0" />
        </button>

        <button class="kpi-btn" data-event="Pitch">
          <span class="kpi-icon">🎯</span>
          <span class="kpi-label">Pitch</span>
          <input class="counter-input" type="number" value="0" min="0" />
        </button>

        <button class="kpi-btn" data-event="Nach Termin gefragt">
          <span class="kpi-icon">🗓️</span>
          <span class="kpi-label">Nach Termin gefragt</span>
          <input class="counter-input" type="number" value="0" min="0" />
        </button>

        <button class="kpi-btn" data-event="Termin vereinbart">
          <span class="kpi-icon">✅</span>
          <span class="kpi-label">Termin vereinbart</span>
          <input class="counter-input" type="number" value="0" min="0" />
        </button>

        <button class="kpi-btn" data-event="Nachqualifizierung">
          <span class="kpi-icon">🔍</span>
          <span class="kpi-label">Nachqualifizierung</span>
          <input class="counter-input" type="number" value="0" min="0" />
        </button>

        <button class="kpi-btn" data-event="An Vorzimmer gescheitert">
          <span class="kpi-icon">🚪</span>
          <span class="kpi-label">An Vorzimmer gescheitert</span>
          <input class="counter-input" type="number" value="0" min="0" />
        </button>

      </div>
    </section>

    <!-- ── SETTING ───────────────────────────────────────────────── -->
    <section id="setting" class="panel">
      <div class="btn-grid">

        <button class="kpi-btn" data-event="Setting geführt">
          <span class="kpi-icon">🤝</span>
          <span class="kpi-label">Setting geführt</span>
          <input class="counter-input" type="number" value="0" min="0" />
        </button>

        <button class="kpi-btn" data-event="Setting Unqualifiziert">
          <span class="kpi-icon">❌</span>
          <span class="kpi-label">Setting Unqualifiziert</span>
          <input class="counter-input" type="number" value="0" min="0" />
        </button>

        <button class="kpi-btn" data-event="No Show">
          <span class="kpi-icon">👻</span>
          <span class="kpi-label">No Show</span>
          <input class="counter-input" type="number" value="0" min="0" />
        </button>

        <button class="kpi-btn" data-event="Setting Follow Up">
          <span class="kpi-icon">🔁</span>
          <span class="kpi-label">Setting Follow Up</span>
          <input class="counter-input" type="number" value="0" min="0" />
        </button>

        <button class="kpi-btn" data-event="Closing terminiert">
          <span class="kpi-icon">📅</span>
          <span class="kpi-label">Closing terminiert</span>
          <input class="counter-input" type="number" value="0" min="0" />
        </button>

      </div>
    </section>

    <!-- ── CLOSING ───────────────────────────────────────────────── -->
    <section id="closing" class="panel">
      <div class="btn-grid">

        <button class="kpi-btn" data-event="Closing geführt">
          <span class="kpi-icon">💬</span>
          <span class="kpi-label">Closing geführt</span>
          <input class="counter-input" type="number" value="0" min="0" />
        </button>

        <button class="kpi-btn" data-event="Closing No Show">
          <span class="kpi-icon">👻</span>
          <span class="kpi-label">Closing No Show</span>
          <input class="counter-input" type="number" value="0" min="0" />
        </button>

        <button class="kpi-btn" data-event="Closing Follow Up">
          <span class="kpi-icon">🔁</span>
          <span class="kpi-label">Closing Follow Up</span>
          <input class="counter-input" type="number" value="0" min="0" />
        </button>

        <button class="kpi-btn" data-event="Folgebesprechung vereinbart">
          <span class="kpi-icon">📆</span>
          <span class="kpi-label">Folgebesprechung vereinbart</span>
          <input class="counter-input" type="number" value="0" min="0" />
        </button>

        <button class="kpi-btn" data-event="Folgebesprechung No Show">
          <span class="kpi-icon">💨</span>
          <span class="kpi-label">Folgebesprechung No Show</span>
          <input class="counter-input" type="number" value="0" min="0" />
        </button>

        <button class="kpi-btn" data-event="Als Kunden gewonnen">
          <span class="kpi-icon">🏆</span>
          <span class="kpi-label">Als Kunden gewonnen</span>
          <input class="counter-input" type="number" value="0" min="0" />
        </button>

        <!-- Betrag: eigene Zeile -->
        <div class="betrag-row">
          <label class="betrag-label">💶 Betrag (€)</label>
          <div class="betrag-input-wrap">
            <input id="betragInput" type="number" min="0" step="0.01" placeholder="0,00" class="betrag-input" />
            <button id="betragBtn" class="betrag-confirm-btn" title="Betrag speichern">✓</button>
          </div>
        </div>

      </div>
    </section>

  </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
